name: PR Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'agent-provisioning/**'
      - 'frontend/**'
      - 'InventoryPlanning.sln'
      - 'infra/**'
      - '.github/workflows/pr-validation.yml'

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      dotnet: ${{ steps.filter.outputs.dotnet }}
      bicep: ${{ steps.filter.outputs.bicep }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dotnet:
              - 'backend/**'
              - 'agent-provisioning/**'
              - 'frontend/**'
              - 'InventoryPlanning.sln'
              - '.github/workflows/pr-validation.yml'
            bicep:
              - 'infra/**'
              - '.github/workflows/pr-validation.yml'

  dotnet-validation:
    needs: changes
    if: needs.changes.outputs.dotnet == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build solution
        run: dotnet build InventoryPlanning.sln -c Release -m:1

      - name: Build WebApp
        run: dotnet build frontend/src/GrokInventoryAndTrend.WebApp/GrokInventoryAndTrend.WebApp.csproj -c Release

      - name: Build AgentProvisioning
        run: dotnet build agent-provisioning/src/GrokInventoryAndTrend.AgentProvisioning/GrokInventoryAndTrend.AgentProvisioning.csproj -c Release

  bicep-validation:
    needs: changes
    if: needs.changes.outputs.bicep == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: az bicep install

      - name: Build Bicep
        run: az bicep build --file infra/main.bicep
